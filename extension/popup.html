<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 400px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      margin: 0;
    }
    h1 {
      font-size: 18px;
      margin-top: 0;
      margin-bottom: 15px;
    }
    .info-section {
      background: rgba(255,255,255,0.1);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 15px;
      font-size: 13px;
      line-height: 1.5;
    }
    button {
      width: 100%;
      padding: 12px;
      margin-bottom: 10px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    #startBtn {
      background: #4CAF50;
      color: white;
    }
    #startBtn:hover {
      background: #45a049;
      transform: translateY(-2px);
    }
    #startBtn:disabled {
      background: #ccc;
      cursor: not-allowed;
      transform: none;
    }
    #clearBtn {
      background: #ff6b6b;
      color: white;
      font-size: 12px;
      padding: 8px;
    }
    #clearBtn:hover {
      background: #ff5252;
    }
    #status {
      padding: 10px;
      border-radius: 6px;
      font-size: 12px;
      word-wrap: break-word;
      min-height: 40px;
    }
    .loading {
      background: #FFC107;
      color: #333;
    }
    .success {
      background: #4CAF50;
      color: white;
    }
    .error {
      background: #f44336;
      color: white;
    }
    .idle {
      background: rgba(255,255,255,0.2);
      color: white;
    }
    .stat-row {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      margin: 5px 0;
    }
  </style>
</head>
<body>
  <h1>📥 Facebook Comment Scraper</h1>
  
  <div class="info-section">
    <strong>How to use:</strong>
    <ul style="margin: 8px 0; padding-left: 20px;">
      <li>Navigate to a Facebook post</li>
      <li>Click "Start Scraping" button</li>
      <li>Wait for all comments to load</li>
      <li>File will auto-download as Excel</li>
    </ul>
  </div>
  
  <button id="startBtn">🚀 Start Scraping</button>
  <button id="clearBtn">Clear Data</button>
  
  <div id="status" class="idle">Ready to scrape...</div>
  
  <div class="info-section" style="font-size: 11px; margin-top: 15px;">
    <strong>Stats:</strong>
    <div class="stat-row">
      <span>Comments found:</span>
      <span id="commentCount">0</span>
    </div>
    <div class="stat-row">
      <span>Replies found:</span>
      <span id="replyCount">0</span>
    </div>
    <div class="stat-row">
      <span>Load progress:</span>
      <span id="progress">0%</span>
    </div>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
