<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 380px;
      font-family: 'Courier New', Consolas, monospace;
      background: #060c14;
      color: #00f0ff;
      padding: 20px;
      position: relative;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background-image:
        linear-gradient(rgba(0,240,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,240,255,0.03) 1px, transparent 1px);
      background-size: 20px 20px;
      pointer-events: none;
    }

    .corner-tl, .corner-br {
      position: absolute;
      width: 14px; height: 14px;
    }
    .corner-tl { top: 8px; left: 8px; border-top: 2px solid #00f0ff; border-left: 2px solid #00f0ff; }
    .corner-br { bottom: 8px; right: 8px; border-bottom: 2px solid #00f0ff; border-right: 2px solid #00f0ff; }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
      padding-bottom: 12px;
      border-bottom: 1px solid #00f0ff30;
    }

    h1 {
      font-size: 13px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #00f0ff;
      text-shadow: 0 0 12px #00f0ff;
    }

    .btn {
      width: 100%;
      padding: 12px 16px;
      margin-bottom: 10px;
      border: 1px solid;
      border-radius: 1px;
      font-size: 11px;
      font-weight: 700;
      font-family: 'Courier New', Consolas, monospace;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      background: transparent;
      transition: all 0.2s ease;
    }

    #startBtn {
      border-color: #00f0ff;
      color: #00f0ff;
      text-shadow: 0 0 8px #00f0ff;
    }
    #startBtn:hover:not(:disabled) {
      background: #00f0ff18;
      box-shadow: 0 0 18px #00f0ff50, inset 0 0 18px #00f0ff10;
    }
    #startBtn:disabled {
      border-color: #00f0ff25;
      color: #00f0ff25;
      cursor: not-allowed;
      text-shadow: none;
    }

    #clearBtn {
      border-color: #ff4d00;
      color: #ff4d00;
      text-shadow: 0 0 8px #ff4d0070;
      padding: 9px 16px;
      font-size: 10px;
    }
    #clearBtn:hover {
      background: #ff4d0015;
      box-shadow: 0 0 18px #ff4d0040;
    }

    #status {
      padding: 12px;
      font-size: 11px;
      word-wrap: break-word;
      min-height: 44px;
      margin-bottom: 12px;
      letter-spacing: 0.5px;
      line-height: 1.6;
      border: 1px solid #00f0ff20;
      background: #00f0ff08;
      color: #8ee3e3;
    }
    #status.loading { border-color: #ffcc00; background: #ffcc0008; color: #ffcc00; animation: pulse 2s infinite; }
    #status.success { border-color: #00ff88; background: #00ff8808; color: #00ff88; }
    #status.error   { border-color: #ff4444; background: #ff444408; color: #ff4444; }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

    .stats-panel {
      border: 1px solid #00f0ff20;
      background: #00f0ff05;
      padding: 12px;
    }
    .stats-label {
      font-size: 9px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #00f0ff50;
      margin-bottom: 10px;
    }
    .stat-row {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      padding: 5px 0;
      border-bottom: 1px solid #00f0ff10;
      color: #8ee3e3;
    }
    .stat-row:last-child { border-bottom: none; }
    .stat-value { color: #00f0ff; text-shadow: 0 0 6px #00f0ff60; font-weight: bold; }
  </style>
</head>
<body>
  <div class="corner-tl"></div>
  <div class="corner-br"></div>

  <div class="header">
    <span>⬡</span>
    <h1>Comment Scraper</h1>
  </div>

  <button class="btn" id="startBtn">▶ &nbsp;Initialize Scrape</button>
  <button class="btn" id="clearBtn">✕ &nbsp;Clear Data</button>

  <div id="status" class="idle">SYSTEM READY — AWAITING INPUT</div>

  <div class="stats-panel">
    <div class="stats-label">Scan Results</div>
    <div class="stat-row"><span>Comments</span><span class="stat-value" id="commentCount">0</span></div>
    <div class="stat-row"><span>Replies</span><span class="stat-value" id="replyCount">0</span></div>
    <div class="stat-row"><span>Progress</span><span class="stat-value" id="progress">0%</span></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
